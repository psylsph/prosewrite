# Prosewrite config.toml

[project]
name = "my_novel"
author = ""
output_dir = "projects"

# ---------------------------------------------------------------------------
# Global defaults — used by any stage that doesn't override them
# ---------------------------------------------------------------------------
[defaults]
api_base_url  = "https://zenmux.ai/api/v1"
#api_base_url  = "http://localhost:11434/api/chat"
api_key_env   = "API_KEY"
model         = "moonshotai/kimi-k2-thinking"
#model         = "kimi-k2:1t-cloud"
temperature   = 0.6          # DeepSeek default; data analysis/general use
max_tokens    = 32768
timeout_s     = 360

# ---------------------------------------------------------------------------
# Per-stage overrides — temperatures follow DeepSeek recommendations:
#   Coding/Math         0.0
#   Data Analysis       1.0
#   General Conversation 1.3
#   Translation         1.3
#   Creative Writing    1.5
# ---------------------------------------------------------------------------

[stages.seed_analysis]
# Analytical critique — data analysis mode
temperature   = 0.3
max_tokens    = 16384

[stages.story_bible]
# Structured planning — data analysis mode
temperature   = 0.6
max_tokens    = 16384

[stages.world_builder]
# Creative but grounded — general conversation
temperature   = 0.6
max_tokens    = 16384

[stages.characters]
# Most creative stage — voice, personality, dialogue
temperature   = 0.6
max_tokens    = 16384

[stages.chapter_outlines]
# Structured creativity — general conversation
temperature   = 0.6
max_tokens    = 32768

[stages.chapter_writer]
# Prose generation — creative writing
temperature   = 1.0
max_tokens    = 32768

[stages.chapter_reviewer]
# Critical analysis — data analysis mode
temperature   = 0.3
max_tokens    = 16384

[stages.continuity_reviewer]
# Cross-chapter continuity check — analytical
temperature   = 0.3
max_tokens    = 32768

[stages.export]
# Mechanical assembly — data analysis mode
temperature   = 0.3
max_tokens    = 16384

# ---------------------------------------------------------------------------
# Persona — injected into every system prompt to fight generic output
# ---------------------------------------------------------------------------
[persona]
name        = "Evelyn Cross"
description = """
You are Evelyn Cross, a veteran editor and ghost-writer with 30 years of experience
in commercial fiction. You write with precision, wit, and emotional intelligence.
You have a particular hatred of generic, flat AI prose. You prize:
- Distinctive character voice over bland narration
- Grounded sensory detail over abstract description
- Subtext in dialogue over on-the-nose exposition
- Scene-level conflict over summary
You never use filler phrases like 'little did he know', 'suddenly', or any sentence
that begins with a character noticing or realising something.
"""

# ---------------------------------------------------------------------------
# Writing style settings — injected into Stage 5 chapter writing
# ---------------------------------------------------------------------------
[style]
pov           = "third person limited"
tense         = "past"
min_words     = 3000
genre         = "military thriller"
notes         = """
- Favour short, punchy sentences during action. Longer, breathless sentences during tension.
- Avoid adjective stacking. One precise word beats three vague ones.
- Each chapter must end on a hook, reversal, or unresolved question.
"""
